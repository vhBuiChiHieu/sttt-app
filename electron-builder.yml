appId: com.sttdkfree.app
productName: STT DK Free
directories:
  output: dist
  buildResources: build
files:
  - out/**
  - package.json
asar: true
win:
  target:
    - target: portable
      arch:
        - x64
    - target: nsis
      arch:
        - x64
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
